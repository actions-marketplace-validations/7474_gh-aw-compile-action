name: Compile Agentic Workflows

on:
  pull_request:
    paths:
      - '**/*.md'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: 7474/gh-aw-compile-action@a8c56ba70fff70cf251d4a7ef96cc157ae86460a # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: git add -N . && git diff

